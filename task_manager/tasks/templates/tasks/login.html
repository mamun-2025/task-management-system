

{% extends 'tasks/base.html' %}

{% block content %}
<div class="min-h[80vh] flex items-center justify-center">
   <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-gray-100 ">
      <div class="text-2xl font-extrabold text-center text-gray-800 mb-6">Welcome Back</h2>

         <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div class="space-y-2">
               {% for field in form %}
                  <label class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
                  <div class="w-full px-4 py-2 border border-gray-300 rounded-lg focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 transition-all">
                     {{ field }}
                  </div>
                  {% if field.errors %}
                     <p class="text-red-500 text-xs mt-1">{{ field.error.0 }}</p>
                  {% endif %}
               {% endfor %}
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300 shadow-md">
               Login
            </button>
         </form>

         <div class="mt-6 text-center">
            <p class="text-gray-600">Don't have an account?
               <a href="{% url 'signup' %}" class="text-blue-600 font-semibold hover:underline">
                  Sign up here
               </a>
            </p>
         </div>
      </div>
   </div>
</div>


{% endblock %}
