

{% extends 'tasks/base.html' %}

{% block content %}

<div class="min-h-[80vh] flex items-center justify-center">
   <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
      <h2 class="text-3xl font-extrabold text-center text-gray-800 mb-6">Create Account</h2>

      <form method="POST" class="space-y-4">
         {% csrf_token %}

         <div class="space-y-4">
            {% for field in form %}
               <label class="block text-sm font-medium text-gray-700">{{ field.label }}</label>
               <div class="w-full px-4 py-2 border border-gray-300 rounded-lg focus-within:ring focus-within:ring-green-500 focus-within:border-green-500 transition-all">
                  {{ field }}
               </div>
               {% if field.errors %}
                  <p class="text-red-500 text-xs mt-1">{{ field.errors.0 }}</p>
               {% endif %}
            {% endfor %}
         </div>

         <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition duration-300 shadow-md">
            Sign Up
         </button>
      </form>

      <div class="mt-6 text-center">
         <p class="text-gray-600">Already have an account?
            <a href="{% url 'login' %}" class="text-green-600 font-semibold hover:underline">Login here</a>
         </p>
      </div>
   </div>
</div>

{% endblock %}
